name: CI/CD Pipeline

on:
  push:
    branches:
      - dev

jobs:

  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22

          script: |
            cd /srv/headora/frontend
            ./deploy.sh